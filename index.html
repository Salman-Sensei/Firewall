<script type="text/babel">
/* ───────────────────────────────────────────────────────────
   SMART SHIELD FIREWALL  –  React 18 + Chart.js
─────────────────────────────────────────────────────────── */
const { useState, useEffect, useRef, useCallback } = React;

/* ── THEME ─────────────────────────────────────────────── */
const C = {
  bg0:'#010d1a', bg1:'rgba(0,16,34,0.97)', bg2:'rgba(0,28,56,0.65)', bg3:'rgba(0,40,80,0.4)',
  b0:'rgba(0,212,255,0.1)', b1:'rgba(0,212,255,0.22)', b2:'rgba(0,212,255,0.45)',
  cyan:'#00d4ff', green:'#00ff88', red:'#ff3355', orange:'#ff8800', purple:'#9d4edd', gold:'#ffd700',
  text:'#d0eeff', dim:'rgba(208,238,255,0.55)', muted:'rgba(208,238,255,0.28)',
};

/* ── HELPERS ────────────────────────────────────────────── */
const ri  = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const rp  = arr  => arr[ri(0,arr.length-1)];
const rb  = (p=0.5) => Math.random() < p;

const SAMPLE_IPS = ['192.168.1.2','10.0.0.5','172.16.0.8','8.8.8.8','43.32.156.1','203.0.113.45','198.51.100.23','91.198.174.1'];
const PROTOCOLS  = ['TCP','UDP','ICMP','HTTP','HTTPS','DNS','SSH','FTP'];
const INFOS      = ['HTTP Request','DNS Query','Ping Request','HTTPS','SSH Connection','TLS Handshake','GET /index.html','POST /api/data','SYN Flood Detected','UDP Probe'];

let _pid = 1;
function genPacket() {
  const allowed = rb(0.72);
  const now = new Date();
  return {
    id: _pid++,
    time: now.toLocaleTimeString('en-US',{hour12:false}),
    srcIP: rp(SAMPLE_IPS),
    dstIP: `${ri(1,254)}.${ri(0,254)}.${ri(0,254)}.${ri(0,254)}`,
    proto: rp(PROTOCOLS),
    info: rp(INFOS),
    status: allowed ? 'Allowed' : 'Blocked',
    bytes: ri(64,65535),
  };
}

function genTrafficData(n=25) {
  return Array.from({length:n}, (_,i) => {
    const allowed = ri(700,3800), blocked = ri(80,900);
    return { time:`${String(i).padStart(2,'0')}:00`, packets:allowed+blocked, allowed, blocked };
  });
}

const PROTO_DATA = [
  {name:'TCP',   value:45.2, color:'#00d4ff'},
  {name:'UDP',   value:28.7, color:'#4ade80'},
  {name:'ICMP',  value:15.3, color:'#ff8800'},
  {name:'HTTP',  value:7.8,  color:'#9d4edd'},
  {name:'Others',value:2.9,  color:'rgba(208,238,255,0.3)'},
];

const RULES_INIT = [
  {id:1,name:'Allow Local Network',   src:'192.168.1.0/24', dst:'Any',            proto:'Any',         action:'Allow', priority:1, active:true},
  {id:2,name:'Block Suspicious IPs',  src:'Any',            dst:'203.0.113.0/24', proto:'Any',         action:'Block', priority:2, active:true},
  {id:3,name:'Allow DNS',             src:'Any',            dst:'8.8.8.8',        proto:'UDP',         action:'Allow', priority:3, active:true},
  {id:4,name:'Block P2P Traffic',     src:'Any',            dst:'Any',            proto:'BitTorrent',  action:'Block', priority:4, active:false},
  {id:5,name:'Allow HTTP/HTTPS',      src:'Any',            dst:'Any',            proto:'TCP:80,443',  action:'Allow', priority:5, active:true},
  {id:6,name:'Block SSH Brute Force', src:'Any',            dst:'Any',            proto:'TCP:22',      action:'Block', priority:6, active:true},
  {id:7,name:'Allow ICMP Ping',       src:'Any',            dst:'Any',            proto:'ICMP',        action:'Allow', priority:7, active:false},
];

const TOP_BLOCKED = [
  {ip:'203.0.113.45',  hits:230, pct:100},
  {ip:'198.51.100.23', hits:187, pct:81},
  {ip:'43.32.32.156',  hits:164, pct:71},
  {ip:'192.0.2.78',    hits:142, pct:62},
  {ip:'203.0.113.10',  hits:98,  pct:43},
];

/* ── CHART.JS HELPERS ───────────────────────────────────── */
const ChartDefaults = () => {
  // Called once to set Chart.js global defaults
  if (window.Chart) {
    Chart.defaults.color = 'rgba(208,238,255,0.45)';
    Chart.defaults.font.family = "'Share Tech Mono', monospace";
    Chart.defaults.font.size = 10;
  }
};

function useChartDestroy(ref) {
  useEffect(() => {
    return () => { if (ref.current) { ref.current.destroy(); ref.current = null; } };
  }, []);
}

/* Area Chart using Chart.js */
function AreaChart({ data, height = 180 }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !window.Chart) return;
    if (chartRef.current) { chartRef.current.destroy(); }

    const ctx = canvasRef.current.getContext('2d');

    const gradC = ctx.createLinearGradient(0,0,0,height);
    gradC.addColorStop(0,'rgba(0,212,255,0.3)');
    gradC.addColorStop(1,'rgba(0,212,255,0)');

    const gradR = ctx.createLinearGradient(0,0,0,height);
    gradR.addColorStop(0,'rgba(255,51,85,0.2)');
    gradR.addColorStop(1,'rgba(255,51,85,0)');

    chartRef.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels: data.map(d => d.time),
        datasets: [
          { label:'Allowed', data:data.map(d=>d.allowed), borderColor:'#00d4ff', backgroundColor:gradC, fill:true, tension:0.4, borderWidth:1.5, pointRadius:0, pointHoverRadius:4 },
          { label:'Blocked', data:data.map(d=>d.blocked), borderColor:'#ff3355', backgroundColor:gradR, fill:true, tension:0.4, borderWidth:1.5, pointRadius:0, pointHoverRadius:4 },
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false, animation:false,
        interaction:{ intersect:false, mode:'index' },
        plugins:{
          legend:{ display:false },
          tooltip:{ backgroundColor:'rgba(1,13,26,0.95)', borderColor:'rgba(0,212,255,0.25)', borderWidth:1, titleColor:'#d0eeff', bodyColor:'rgba(208,238,255,0.7)', padding:10, titleFont:{family:"'Share Tech Mono'",size:10}, bodyFont:{family:"'Share Tech Mono'",size:10} }
        },
        scales:{
          x:{ grid:{ color:'rgba(0,212,255,0.06)', drawBorder:false }, ticks:{ color:'rgba(208,238,255,0.4)', maxTicksLimit:8, font:{size:9} }, border:{display:false} },
          y:{ grid:{ color:'rgba(0,212,255,0.06)', drawBorder:false }, ticks:{ color:'rgba(208,238,255,0.4)', font:{size:9} }, border:{display:false} }
        }
      }
    });
  }, [data]);

  useChartDestroy(chartRef);
  return <div style={{height}}><canvas ref={canvasRef}/></div>;
}

/* Donut Chart using Chart.js */
function DonutChart({ data, size=130, centerLabel, centerSub='Total' }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !window.Chart) return;
    if (chartRef.current) { chartRef.current.destroy(); }

    chartRef.current = new Chart(canvasRef.current, {
      type: 'doughnut',
      data: {
        labels: data.map(d => d.name),
        datasets:[{ data:data.map(d=>d.value||d.hits||d.packets||d), backgroundColor:data.map(d=>d.color||d.fill), borderWidth:0, hoverOffset:3 }]
      },
      options: {
        responsive:false, cutout:'65%', animation:{ duration:600 },
        plugins:{
          legend:{ display:false },
          tooltip:{ backgroundColor:'rgba(1,13,26,0.95)', borderColor:'rgba(0,212,255,0.25)', borderWidth:1, titleColor:'#d0eeff', bodyColor:'rgba(208,238,255,0.7)', padding:10, callbacks:{label:(ctx)=>`${ctx.label}: ${ctx.parsed}%`} }
        }
      }
    });
  }, []);

  useChartDestroy(chartRef);
  return (
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <canvas ref={canvasRef} width={size} height={size}/>
      {centerLabel && (
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:size>110?15:12,fontWeight:700,color:C.cyan,textShadow:`0 0 10px ${C.cyan}88`}}>{centerLabel}</div>
          <div style={{fontSize:9,color:C.muted}}>{centerSub}</div>
        </div>
      )}
    </div>
  );
}

/* ── SHARED UI COMPONENTS ───────────────────────────────── */
const mono = {fontFamily:"'Share Tech Mono',monospace"};
const orb  = {fontFamily:"'Orbitron',sans-serif"};

function Badge({ status }) {
  const ok = status==='Allowed'||status==='Allow'||status==='active';
  const col = ok ? C.green : C.red;
  return (
    <span style={{background:`${col}18`,color:col,border:`1px solid ${col}33`,padding:'2px 9px',borderRadius:4,fontSize:10,fontWeight:700,...mono,letterSpacing:'0.5px',whiteSpace:'nowrap'}}>
      {status.toUpperCase()}

  );
}

function Toggle({ checked, onChange }) {

      <div style={{position:'absolute',width:18,height:18,borderRadius:'50%',background:checked?C.green:'rgba(208,238,255,0.4)',top:2,left:checked?20:2,transition:'all 0.3s',boxShadow:checked?`0 0 8px ${C.green}`:'none'}}/>
    </div>

}

function Card({ children, style={} }) {
  return <div style={{background:C.bg1,border:`1px solid ${C.b0}`,borderRadius:12,padding:18,backdropFilter:'blur(12px)',transition:'border-color 0.2s',...style}}>{children}</div>;
}

function StatCard({ icon, label, value, sub, color='cyan', delta }) {
  const col = color==='green'?C.green:color==='red'?C.red:color==='orange'?C.orange:C.cyan;
  return (
    <div style={{background:C.bg1,border:`1px solid ${C.b0}`,borderRadius:12,padding:18,flex:1,minWidth:145,boxShadow:`0 0 20px ${col}11`,animation:'fadeUp 0.4s ease-out'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
        <span style={{fontSize:10,color:C.dim,textTransform:'uppercase',letterSpacing:'1.2px',...mono}}>{label}</span>
        <div style={{width:30,height:30,borderRadius:8,background:`${col}18`,display:'flex',alignItems:'center',justifyContent:'center',border:`1px solid ${col}30`,fontSize:13,flexShrink:0}}>{icon}</div>
      </div>
      <div style={{...orb,fontSize:26,fontWeight:700,color:col,lineHeight:1,marginBottom:5,textShadow:`0 0 15px ${col}66`}}>{value}</div>
      <div style={{fontSize:11,color:C.dim}}>
        {delta!==undefined && <span style={{color:delta>0?C.green:C.red,marginRight:4,fontWeight:600,...mono}}>{delta>0?'↑':'↓'}{Math.abs(delta)}%</span>}

  );
}

   LOGIN PAGE

function LoginPage({ onLogin }) {
  const [user,setUser]   = useState('');
  const [pass,setPass]   = useState('');
  const [show,setShow]   = useState(false);
  const [busy,setBusy]   = useState(false);
  const [err,setErr]     = useState('');
  const dots = Array.from({length:35},(_,i)=>({id:i,x:ri(2,98),y:ri(2,98),s:ri(1,3),d:ri(2,7)}));

  function submit() {
    if(!user.trim()||!pass.trim()){setErr('Please enter both fields');return;}
    setErr(''); setBusy(true);
    setTimeout(()=>{setBusy(false);onLogin();},1400);
  }

  const iStyle = {
    background:'rgba(0,22,46,0.8)', border:`1px solid ${C.b1}`, color:C.text,
    borderRadius:8, padding:'12px 14px', fontSize:13, outline:'none', width:'100%', transition:'border-color 0.2s',
  };

  return (
    <div style={{minHeight:'100vh',background:C.bg0,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}}>
      {/* Grid bg */}
      <div style={{position:'absolute',inset:0,backgroundImage:`linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px)`,backgroundSize:'44px 44px',pointerEvents:'none'}}/>
      {/* Radial glow */}
      <div style={{position:'absolute',inset:0,backgroundImage:`radial-gradient(ellipse 80% 60% at 50% -10%,rgba(0,212,255,0.1) 0%,transparent 65%)`,pointerEvents:'none'}}/>
      {/* Particles */}
      {dots.map(p=><div key={p.id} style={{position:'absolute',left:`${p.x}%`,top:`${p.y}%`,width:p.s,height:p.s,borderRadius:'50%',background:C.cyan,opacity:0.25,animation:`pulse ${p.d}s ease-in-out infinite`,pointerEvents:'none'}}/>)}
      {/* Scan line */}

/* ═══════════════════════════════════════════════════════════
   LIVE MONITOR
═══════════════════════════════════════════════════════════ */
function LiveMonitorPage() {
  const [packets,  setPackets ] = useState(()=>Array.from({length:20},genPacket));
  const [filter,   setFilter  ] = useState('All');
  const [search,   setSearch  ] = useState('');
  const [paused,   setPaused  ] = useState(false);
  const [pps,      setPps     ] = useState(256);
  const [conns,    setConns   ] = useState(128);
  const [blocked,  setBlocked ] = useState(6149);
  const [allowed,  setAllowed ] = useState(18382);

  useEffect(()=>{
    if(paused) return;
    const id = setInterval(()=>{
      const p = genPacket();
      setPackets(ps => [p,...ps].slice(0,30));
      setPps(v => Math.max(80,v+ri(-25,35)));
      setConns(v => Math.max(40,v+ri(-4,7)));
      if(p.status==='Blocked') setBlocked(v=>v+1);
      else setAllowed(v=>v+1);
    }, 900);
    return ()=>clearInterval(id);
  },[paused]);

  const shown = packets.filter(p => {
    if(filter!=='All' && p.status!==filter) return false;
    const q = search.toLowerCase();
    if(q && !p.srcIP.includes(q) && !p.dstIP.includes(q) && !p.proto.toLowerCase().includes(q) && !p.info.toLowerCase().includes(q)) return false;
    return true;
  });

  return (
    <PageWrap>
      <PageTitle title="LIVE MONITOR" sub="Real-time network traffic monitoring"/>
      {/* Filter bar */}
      <Card style={{padding:'11px 14px',marginBottom:14,display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        {['All','Allowed','Blocked'].map(f=>(
          <button key={f} onClick={()=>setFilter(f)}
            style={{padding:'5px 14px',borderRadius:6,border:`1px solid ${filter===f?C.b2:C.b0}`,background:filter===f?'rgba(0,212,255,0.1)':'transparent',color:filter===f?C.cyan:C.dim,fontSize:12,cursor:'pointer',transition:'all 0.2s'}}>
            {f}
          </button>
        ))}
        <select style={{...inputStyle({minWidth:110})}}>
          <option>All Protocols</option>{PROTOCOLS.map(p=><option key={p}>{p}</option>)}
        </select>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search IP / protocol / info..." style={{...inputStyle({minWidth:220})}} onFocus={e=>e.target.style.borderColor=C.b2} onBlur={e=>e.target.style.borderColor=C.b0}/>
        <div style={{marginLeft:'auto',display:'flex',gap:8}}>
          <button onClick={()=>setPaused(v=>!v)} style={{...inputStyle({cursor:'pointer',color:paused?C.green:C.orange,borderColor:paused?'rgba(0,255,136,0.3)':'rgba(255,136,0,0.3)',padding:'5px 14px',minWidth:90})}}>
            {paused ? '▶ Resume' : '⏸ Pause'}
          </button>
          <button onClick={()=>setPackets([])} style={{...inputStyle({cursor:'pointer',color:C.red,borderColor:'rgba(255,51,85,0.3)',padding:'5px 14px'})}}>Clear</button>
        </div>
      </Card>
      {/* Table */}
      <Card style={{padding:0,overflow:'hidden',marginBottom:14}}>
        <div style={{overflowX:'auto',maxHeight:340,overflowY:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead style={{position:'sticky',top:0,background:'rgba(0,12,26,0.99)',zIndex:2}}>
              <tr>{['Time','Source IP','Destination IP','Protocol','Info','Bytes','Status'].map(h=>(
                <th key={h} style={{textAlign:'left',padding:'9px 12px',fontSize:10,color:C.dim,letterSpacing:'1px',textTransform:'uppercase',borderBottom:`1px solid ${C.b0}`,...mono,whiteSpace:'nowrap'}}>{h}</th>
              ))}</tr>
            </thead>
            <tbody>
              {shown.length===0
                ? <tr><td colSpan={7} style={{padding:36,textAlign:'center',color:C.muted,fontSize:12}}>No packets match the current filter</td></tr>
                : shown.map((p,i)=>(
                  <tr key={p.id} style={{animation:i<2?'slideIn 0.3s ease-out':undefined,transition:'background 0.1s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(0,212,255,0.03)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <td style={{padding:'7px 12px',fontSize:11,color:C.muted,...mono,borderBottom:`1px solid rgba(0,212,255,0.04)`,whiteSpace:'nowrap'}}>{p.time}</td>
                    <td style={{padding:'7px 12px',fontSize:11,color:C.cyan,...mono,borderBottom:`1px solid rgba(0,212,255,0.04)`,whiteSpace:'nowrap'}}>{p.srcIP}</td>
                    <td style={{padding:'7px 12px',fontSize:11,color:C.dim,...mono,borderBottom:`1px solid rgba(0,212,255,0.04)`,whiteSpace:'nowrap'}}>{p.dstIP}</td>
                    <td style={{padding:'7px 12px',borderBottom:`1px solid rgba(0,212,255,0.04)`}}><span style={{background:'rgba(0,212,255,0.08)',border:`1px solid ${C.b0}`,borderRadius:4,padding:'1px 7px',fontSize:10,...mono}}>{p.proto}</span></td>
                    <td style={{padding:'7px 12px',fontSize:11,color:C.dim,borderBottom:`1px solid rgba(0,212,255,0.04)`}}>{p.info}</td>
                    <td style={{padding:'7px 12px',fontSize:11,color:C.muted,...mono,borderBottom:`1px solid rgba(0,212,255,0.04)`}}>{p.bytes.toLocaleString()}</td>
                    <td style={{padding:'7px 12px',borderBottom:`1px solid rgba(0,212,255,0.04)`}}><Badge status={p.status}/></td>
                  </tr>
                ))

function FirewallRulesPage() {
  const [rules,    setRules   ] = useState(RULES_INIT);
  const [showForm, setShowForm] = useState(false);
  const [form,     setForm    ] = useState({name:'',src:'',dst:'',proto:'TCP',action:'Allow',priority:''});
  const [msg,      setMsg     ] = useState('');

  function toggleRule(id){ setRules(rs=>rs.map(r=>r.id===id?{...r,active:!r.active}:r)); }
  function deleteRule(id){ if(window.confirm('Delete this rule?')) setRules(rs=>rs.filter(r=>r.id!==id)); }
  function addRule(){
    if(!form.name.trim()){alert('Rule name is required');return;}
    setRules(rs=>[...rs,{...form,id:Date.now(),active:true,priority:rs.length+1}]);
    setForm({name:'',src:'',dst:'',proto:'TCP',action:'Allow',priority:''});
    setShowForm(false);
    setMsg('✓ Rule added successfully');
    setTimeout(()=>setMsg(''),3000);
  }

  const fi = (extra={}) => ({...inputStyle({width:'100%',...extra})});
  return (
    <PageWrap>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>

          + ADD RULE
        </button>

      {msg && <div style={{background:'rgba(0,255,136,0.1)',border:'1px solid rgba(0,255,136,0.3)',color:C.green,borderRadius:8,padding:'10px 14px',fontSize:12,marginBottom:14,animation:'fadeIn 0.3s'}}>{msg}</div>}

      <Card style={{padding:0,overflow:'hidden',marginBottom:16}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr>
              {['#','Rule Name','Source','Destination','Protocol','Action','Priority','Status','Controls'].map(h=>(
                <th key={h} style={{textAlign:'left',padding:'10px 12px',fontSize:10,color:C.dim,letterSpacing:'1px',textTransform:'uppercase',borderBottom:`1px solid ${C.b0}`,...mono,whiteSpace:'nowrap'}}>{h}</th>

  const tabs = ['General','Security','Notifications','Logging','System'];

  const SRow = ({label,desc,k}) => (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 0',borderBottom:`1px solid ${C.b0}`}}>
      <div>
        <div style={{fontSize:13,color:C.text,marginBottom:2}}>{label}</div>
        {desc && <div style={{fontSize:11,color:C.muted}}>{desc}</div>}
      </div>
      <Toggle checked={cfg[k]} onChange={()=>tog(k)}/>
    </div>
  );

  const sysInfo=[
    ['Firewall Version','1.0.0'],['Last Updated','May 27, 2024  12:30 PM'],
    ['Uptime','5d 14h 32m'],['Total Packets Processed','2,547,792'],
    ['Database Size','45.2 MB'],['CPU Usage','12.4%'],['Memory','234 MB / 2 GB'],
  ];

  return (
    <PageWrap>
      <PageTitle title="SETTINGS" sub="Configure your firewall settings and preferences"/>
      {/* Tabs */}
      <div style={{display:'flex',gap:3,marginBottom:20,background:C.bg2,borderRadius:10,padding:5,border:`1px solid ${C.b0}`,width:'fit-content'}}>
        {tabs.map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:'7px 16px',borderRadius:7,border:`1px solid ${t===tab?C.b1:'transparent'}`,background:t===tab?'rgba(0,212,255,0.1)':'transparent',color:t===tab?C.cyan:C.dim,fontSize:12,fontWeight:t===tab?600:400,cursor:'pointer',transition:'all 0.2s'}}>
            {t}
          </button>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1.5fr 1fr',gap:14}}>
        <Card>
          {tab==='General' && <>
            <div style={{...orb,fontSize:12,color:C.cyan,letterSpacing:'1.5px',marginBottom:4}}>GENERAL SETTINGS</div>
            <div style={{height:1,background:`linear-gradient(90deg,${C.cyan},transparent)`,marginBottom:16}}/>
            <SRow label="Enable Firewall"  desc="Master toggle for all firewall protection" k="fw"/>
            <SRow label="Auto Start"       desc="Start firewall automatically on system boot" k="autoStart"/>
            <SRow label="Stealth Mode"     desc="Hide firewall presence from network scans"  k="stealth"/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 0'}}>
              <div><div style={{fontSize:13,color:C.text,marginBottom:2}}>Default Action</div><div style={{fontSize:11,color:C.muted}}>Applied to unmatched packets</div></div>
              <select value={cfg.defAction} onChange={e=>setCfg(c=>({...c,defAction:e.target.value}))} style={inputStyle({minWidth:120})}>
                <option>Allow</option><option>Deny</option><option>Reject</option>
              </select>
            </div>
          </>}
          {tab==='Security' && <>
            <div style={{...orb,fontSize:12,color:C.cyan,letterSpacing:'1.5px',marginBottom:4}}>SECURITY SETTINGS</div>
            <div style={{height:1,background:`linear-gradient(90deg,${C.cyan},transparent)`,marginBottom:16}}/>
            <SRow label="Intrusion Detection"     desc="Detect and block intrusion attempts automatically" k="intrusion"/>
            <SRow label="Geo Blocking"            desc="Block traffic from high-risk geographic regions"  k="geoBlock"/>
            <SRow label="Deep Packet Inspection"  desc="Analyze packet payload for hidden threats"        k="deepInspect"/>
            <SRow label="Rate Limiting"           desc="Throttle excessive connections per source IP"     k="rateLimit"/>
          </>}
          {tab==='Notifications' && <>
            <div style={{...orb,fontSize:12,color:C.cyan,letterSpacing:'1.5px',marginBottom:4}}>NOTIFICATION SETTINGS</div>
            <div style={{height:1,background:`linear-gradient(90deg,${C.cyan},transparent)`,marginBottom:16}}/>
            <SRow label="Email Alerts"       desc="Send threat alerts to configured email address" k="emailAlerts"/>
            <SRow label="Slack Notifications" desc="Post alerts to your Slack workspace"           k="slackAlerts"/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 0',borderBottom:`1px solid ${C.b0}`}}>
              <div><div style={{fontSize:13,color:C.text}}>Alert Threshold</div><div style={{fontSize:11,color:C.muted}}>Minimum severity for notifications</div></div>
              <select value={cfg.threshold} onChange={e=>setCfg(c=>({...c,threshold:e.target.value}))} style={inputStyle({minWidth:120})}>
                <option>Low</option><option>Medium</option><option>High</option><option>Critical</option>
              </select>
            </div>
          </>}
          {tab==='Logging' && <>
            <div style={{...orb,fontSize:12,color:C.cyan,letterSpacing:'1.5px',marginBottom:4}}>LOGGING SETTINGS</div>
            <div style={{height:1,background:`linear-gradient(90deg,${C.cyan},transparent)`,marginBottom:16}}/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 0',borderBottom:`1px solid ${C.b0}`}}>
              <div><div style={{fontSize:13,color:C.text}}>Log Level</div><div style={{fontSize:11,color:C.muted}}>Verbosity of log output</div></div>
              <select value={cfg.logLevel} onChange={e=>setCfg(c=>({...c,logLevel:e.target.value}))} style={inputStyle({minWidth:120})}>
                <option>Debug</option><option>Info</option><option>Warning</option><option>Error</option>
              </select>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 0'}}>
              <div><div style={{fontSize:13,color:C.text}}>Log Retention (days)</div><div style={{fontSize:11,color:C.muted}}>How long to keep log entries</div></div>
              <input value={cfg.logRetention} onChange={e=>setCfg(c=>({...c,logRetention:e.target.value}))} type="number" min="1" max="365" style={inputStyle({maxWidth:80,textAlign:'center'})}/>
            </div>
          </>}
          {tab==='System' && <>
            <div style={{...orb,fontSize:12,color:C.cyan,letterSpacing:'1.5px',marginBottom:4}}>SYSTEM INFORMATION</div>
            <div style={{height:1,background:`linear-gradient(90deg,${C.cyan},transparent)`,marginBottom:16}}/>
            {sysInfo.map(([k,v],i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:i<sysInfo.length-1?`1px solid ${C.b0}`:'none'}}>
                <span style={{fontSize:12,color:C.dim}}>{k}</span>
                <span style={{fontSize:12,color:C.text,...mono}}>{v}</span>
              </div>
            ))}
          </>}
          <div style={{marginTop:20,display:'flex',gap:10}}>
            <button style={{background:`linear-gradient(135deg,${C.cyan},#0088bb)`,border:'none',borderRadius:8,color:'#001520',padding:'9px 22px',...orb,fontSize:10,fontWeight:700,letterSpacing:'1px',cursor:'pointer'}}>SAVE CHANGES</button>
            <button style={{background:'transparent',border:`1px solid ${C.b1}`,borderRadius:8,color:C.dim,padding:'9px 18px',fontSize:12,cursor:'pointer'}}>Reset Defaults</button>
          </div>
        </Card>

        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <Card>
            <div style={{...orb,fontSize:13,fontWeight:700,marginBottom:14}}>Service Status</div>
            {[
              {l:'Firewall Engine',    s:'Running',    c:C.green},
              {l:'Packet Inspector',  s:'Active',     c:C.green},
              {l:'Threat Database',   s:'Up to date', c:C.green},
              {l:'Geo-IP Service',    s:'Disabled',   c:C.muted},
              {l:'Logging Service',   s:'Running',    c:C.green},
            ].map((x,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<4?`1px solid ${C.b0}`:'none'}}>
                <span style={{fontSize:12,color:C.dim}}>{x.l}</span>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:7,height:7,borderRadius:'50%',background:x.c,boxShadow:`0 0 5px ${x.c}`}}/>
                  <span style={{fontSize:11,color:x.c,...mono}}>{x.s}</span>
                </div>
              </div>
            ))}
          </Card>
          <Card>
            <div style={{...orb,fontSize:13,fontWeight:700,marginBottom:14}}>Resource Usage</div>
            {[{l:'CPU',v:12,c:C.cyan},{l:'Memory',v:23,c:C.green},{l:'Disk I/O',v:8,c:C.orange},{l:'Network',v:61,c:C.purple}].map((r,i)=>(
              <div key={i} style={{marginBottom:13}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:11}}>
                  <span style={{color:C.dim,...mono}}>{r.l}</span>
                  <span style={{color:r.c,fontWeight:600,...mono}}>{r.v}%</span>
                </div>
                <div style={{height:5,background:'rgba(255,255,255,0.07)',borderRadius:3}}>
                  <div style={{height:'100%',width:`${r.v}%`,background:`linear-gradient(90deg,${r.c},${r.c}88)`,borderRadius:3,boxShadow:`0 0 5px ${r.c}55`,transition:'width 0.6s ease-out'}}/>
                </div>
              </div>
            ))}
          </Card>
        </div>
      </div>
    </PageWrap>
  );
}

/* ═══════════════════════════════════════════════════════════
   LOGS
═══════════════════════════════════════════════════════════ */
function LogsPage() {
  const typeColor = {INFO:C.cyan,WARN:C.orange,ERROR:C.red,BLOCK:C.red,ALLOW:C.green};
  const [filter,  setFilter ] = useState('All');
  const [logs] = useState(()=>Array.from({length:35},(_,i)=>{
    const types=['INFO','WARN','ERROR','BLOCK','ALLOW'];
    const msgs=['Packet filtered','Rule matched','Threat detected','Connection blocked','DNS query allowed','SSH attempt blocked','Geo-block applied','Rate limit exceeded','DPI inspection complete','System health check OK'];
    const t = types[ri(0,types.length-1)];
    const d = new Date(Date.now()-i*ri(25000,160000));
    return {id:i, time:d.toLocaleString('en-US',{hour12:false}), type:t, msg:rp(msgs), src:rp(SAMPLE_IPS), rule:`Rule #${ri(1,7)}`};
  }));

  const shown = filter==='All' ? logs : logs.filter(l=>l.type===filter);
  return (
    <PageWrap>
      <PageTitle title="LOGS" sub="System and security event logs"/>
      <Card style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'11px 14px',borderBottom:`1px solid ${C.b0}`,display:'flex',gap:8,flexWrap:'wrap'}}>
          {['All','INFO','WARN','ERROR','BLOCK','ALLOW'].map(t=>(
            <button key={t} onClick={()=>setFilter(t)} style={{padding:'4px 13px',borderRadius:6,border:`1px solid ${filter===t?(typeColor[t]||C.b2):C.b0}`,background:filter===t?`${typeColor[t]||C.b0}18`:'transparent',color:filter===t?(typeColor[t]||C.cyan):C.dim,fontSize:11,cursor:'pointer',transition:'all 0.2s'}}>
              {t}
            </button>
          ))}
          <span style={{marginLeft:'auto',fontSize:11,color:C.muted,alignSelf:'center',...mono}}>{shown.length} entries</span>
        </div>
        <div style={{maxHeight:480,overflowY:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead style={{position:'sticky',top:0,background:'rgba(0,12,26,0.99)'}}>
              <tr>{['Timestamp','Level','Message','Source IP','Rule'].map(h=><th key={h} style={{textAlign:'left',padding:'9px 12px',fontSize:10,color:C.dim,letterSpacing:'1px',textTransform:'uppercase',borderBottom:`1px solid ${C.b0}`,...mono,whiteSpace:'nowrap'}}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {shown.map(l=>{
                const col = typeColor[l.type]||C.dim;
                return (
                  <tr key={l.id} onMouseEnter={e=>e.currentTarget.style.background='rgba(0,212,255,0.025)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <td style={{padding:'8px 12px',color:C.muted,...mono,fontSize:11,borderBottom:`1px solid rgba(0,212,255,0.04)`,whiteSpace:'nowrap'}}>{l.time}</td>
                    <td style={{padding:'8px 12px',borderBottom:`1px solid rgba(0,212,255,0.04)`}}><span style={{color:col,...mono,fontSize:10,fontWeight:700,background:`${col}15`,border:`1px solid ${col}30`,borderRadius:4,padding:'2px 7px'}}>{l.type}</span></td>
                    <td style={{padding:'8px 12px',fontSize:12,color:C.text,borderBottom:`1px solid rgba(0,212,255,0.04)`}}>{l.msg}</td>
                    <td style={{padding:'8px 12px',color:C.cyan,...mono,fontSize:11,borderBottom:`1px solid rgba(0,212,255,0.04)`,whiteSpace:'nowrap'}}>{l.src}</td>
                    <td style={{padding:'8px 12px',color:C.muted,...mono,fontSize:11,borderBottom:`1px solid rgba(0,212,255,0.04)`}}>{l.rule}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>
    </PageWrap>
  );
}

/* ═══════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════ */
function App() {
  const [authed, setAuthed] = useState(false);
  const [page,   setPage  ] = useState('landing');

  // Set Chart.js defaults once
  useEffect(()=>{ ChartDefaults(); },[]);

  if(!authed) return <LoginPage onLogin={()=>{ setAuthed(true); setPage('dashboard'); }}/>;
  if(page==='landing') return <LandingPage onLaunch={()=>setPage('dashboard')}/>;

  const pages = {
    dashboard: <DashboardPage/>,
    monitor:   <LiveMonitorPage/>,
    rules:     <FirewallRulesPage/>,
    analytics: <AnalyticsPage/>,
    map:       <NetworkMapPage/>,
    settings:  <SettingsPage/>,
    logs:      <LogsPage/>,
  };

  return (
    <AppLayout page={page} setPage={setPage}>
      {pages[page] || <DashboardPage/>}
    </AppLayout>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
